<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Finanças - BI & Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        :root { 
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db;
            --bg: #121212; --card-bg: #1e1e1e; --text-main: #e0e0e0; 
            --border: #333333; --pink: #ff4081;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .card { 
            background: var(--card-bg); padding: 15px; border-radius: 20px; 
            width: 100%; max-width: 450px; border: 1px solid var(--border); 
            margin-bottom: 15px; box-sizing: border-box; 
        }
        .chart-main { width: 180px; height: 180px; margin: 0 auto; position: relative; }
        #saldo-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
        #saldo-valor { font-weight: bold; font-size: 1.1rem; display: block; }
        .controles { display: flex; gap: 8px; margin-bottom: 12px; width: 100%; max-width: 450px; }
        select, .btn-nav { 
            background: var(--card-bg); color: white; border: 1px solid var(--border); 
            padding: 10px; border-radius: 12px; cursor: pointer; flex: 1; font-size: 0.85rem; 
            transition: all 0.2s ease;
        }
        .btn-nav.active { background: var(--blue); border-color: var(--blue); font-weight: bold; }
        .transacao { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 5px; border-bottom: 1px solid var(--border); gap: 10px; }
        .info { flex: 1; }
        .info strong { display: block; font-size: 0.9rem; margin-bottom: 2px; }
        .info small { color: #888; font-size: 0.75rem; display: block; }
        .cat-tag { color: var(--pink); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .ai-comment { 
            font-size: 11px; color: var(--blue); margin-top: 8px; 
            background: rgba(52, 152, 219, 0.08); padding: 8px; border-radius: 8px; 
            border-left: 3px solid var(--blue); line-height: 1.3; 
        }
        .valor { font-weight: bold; font-size: 0.95rem; text-align: right; min-width: 85px; }
        h4 { margin: 0 0 15px 0; font-size: 0.8rem; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        .tabela-bi { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .tabela-bi th { text-align: left; color: #888; font-weight: normal; padding: 8px 5px; border-bottom: 1px solid var(--border); }
        .tabela-bi td { padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank { color: var(--pink); font-weight: bold; width: 20px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">Carregando dados...</div>

    <div class="card">
        <div class="chart-main">
            <canvas id="meuGrafico"></canvas>
            <div id="saldo-info">
                <span style="font-size:0.6rem; color:#888">LÍQUIDO</span>
                <span id="saldo-valor">R$ 0</span>
            </div>
        </div>
        <div style="display: flex; justify-content: space-around; margin-top: 15px; text-align: center;">
            <div><small style="color:#888">Receitas</small><div id="t-ent" style="color: var(--green); font-weight: bold;">R$ 0</div></div>
            <div><small style="color:#888">Despesas</small><div id="t-sai" style="color: var(--red); font-weight: bold;">R$ 0</div></div>
        </div>
    </div>

    <div class="controles">
        <button class="btn-nav active" id="tab-feed" onclick="mudarAba('feed')">📑 Extrato</button>
        <button class="btn-nav" id="tab-bi" onclick="mudarAba('bi')">📈 BI / Estratégia</button>
        <button onclick="carregarDados()" style="flex:0.25">🔄</button>
    </div>

    <div class="controles">
        <select id="filtroTempo" onchange="filtrarERenderizar()" style="flex:1"></select>
    </div>

    <div id="container-feed" class="card">
        <h4 style="color: var(--green); border-bottom: 1px solid #2ecc7133; padding-bottom: 5px;">💰 Receitas</h4>
        <div id="lista-receitas"></div>
        <h4 style="color: var(--red); border-bottom: 1px solid #e74c3c33; padding-bottom: 5px; margin-top: 25px;">💸 Despesas</h4>
        <div id="lista-despesas"></div>
    </div>

    <div id="container-bi" style="display: none; width: 100%; max-width: 450px;">
        <div class="card">
            <h4>📊 Maiores Gastos</h4>
            <canvas id="graficoBarras"></canvas>
            <table class="tabela-bi">
                <thead>
                    <tr><th class="rank">#</th><th>Categoria</th><th style="text-align: right;">Valor Total</th></tr>
                </thead>
                <tbody id="corpo-tabela-gastos"></tbody>
            </table>
        </div>
        <div class="card">
            <h4>📈 Tendência de Gasto (Acumulado)</h4>
            <canvas id="graficoLinha"></canvas>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        // André, verifique se esta URL é a da sua ÚLTIMA implantação
        const URL_API = "https://script.google.com/macros/s/AKfycbwbx4Utft2D_59jbBZP6jbqKEIHrxeKnK_MarrksV1dzZ7_CK74Z9ITmb0xN0bRdxeTVA/exec"; 
        
        const MAPA_CATEGORIAS = {
            'Alimentação': ['mercado', 'hortifruti', 'restaurante', 'ifood', 'comida', 'padaria', 'lanche', 'picolé', 'biscoito', 'bala', 'doce', 'sorvete', 'café', 'bebida', 'açougue', 'supermercado', 'feira', 'confeitaria', 'marmita', 'delivery', 'vinho', 'cerveja'],
            'Habitação': ['luz', 'água', 'internet', 'condomínio', 'boleto', 'reforma', 'limpeza', 'aluguel', 'iptu', 'gás', 'móveis', 'decoração', 'manutenção', 'reparos', 'lavanderia'],
            'Transporte': ['uber', 'gasolina', 'combustível', 'estacionamento', 'pedágio', 'oficina', '99pop', 'ônibus', 'metrô', 'ipva', 'seguro auto', 'troca de óleo', 'pneu', 'licenciamento'],
            'Lazer': ['cinema', 'viagem', 'netflix', 'bar', 'spotify', 'praia', 'games', 'show', 'teatro', 'hospedagem', 'passagem aérea', 'livro', 'hbomax', 'disney+', 'estádio', 'futebol'],
            'Saúde': ['farmácia', 'médico', 'academia', 'suplemento', 'dentista', 'exame', 'consulta', 'psicólogo', 'hospital', 'plano de saúde', 'drogaria', 'ótica'],
            'Compras': ['shopee', 'amazon', 'shein', 'mercado livre', 'roupas', 'eletrônicos', 'eletrodoméstico', 'presente', 'magalu', 'ali-express', 'perfume', 'cosmético', 'tenis', 'acessórios'],
            'Contas': ['faculdade', 'esporte', 'serviços bancários', 'pensão', 'celular', 'assinatura', 'imposto', 'cartão de crédito', 'empréstimo', 'tarifa', 'seguro', 'anuidade', 'mei', 'irpf'],
            'Receitas': ['salário', 'ticket', 'vale', 'vendas', 'recebi', 'pix recebido', 'reembolso', 'lucro de bolo', 'rendimento', 'dividendo', 'bônus', 'décimo terceiro', 'extra', 'freelance']
        };

        let todosOsDados = [];
        let charts = {};

        async function carregarDados() {
            document.getElementById('loading').style.display = 'flex';
            try {
                // Cache buster adicionado (?t=...) para garantir dados novos
                const res = await fetch(`${URL_API}?filtro=tudo&t=${new Date().getTime()}`);
                todosOsDados = await res.json();
                popularSeletor(todosOsDados);
                filtrarERenderizar();
            } catch (e) { 
                console.error("Erro na API", e); 
            } finally { 
                document.getElementById('loading').style.display = 'none'; 
            }
        }

        function popularSeletor(dados) {
            const seletor = document.getElementById('filtroTempo');
            const agora = new Date();
            const mesAt = `${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;
            
            const meses = [...new Set(dados.map(i => {
                if(!i.Data) return null;
                const partes = i.Data.split(' ')[0].split('/');
                return partes.length >= 3 ? `${partes[1]}/${partes[2]}` : null;
            }))].filter(m => m && m !== mesAt).sort().reverse();

            let opt = '<option value="mes_atual">Mês Atual</option>';
            meses.forEach(m => opt += `<option value="${m}">${m}</option>`);
            seletor.innerHTML = opt;
        }

        function filtrarERenderizar() {
            const f = document.getElementById('filtroTempo').value;
            const agora = new Date();
            const mesAtStr = `${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;
            
            const filtrados = todosOsDados.filter(i => {
                if (!i.Data) return false;
                if (f === "mes_atual") {
                    // Verificação mais robusta para o mês atual
                    return i.Data.includes(mesAtStr) || i.Data.includes(`/${agora.getFullYear().toString().slice(-2)}`);
                }
                return i.Data.includes(f);
            });

            renderizarExtrato(filtrados);
            if (document.getElementById('container-bi').style.display === 'block') processarBI();
        }

        function renderizarExtrato(dados) {
            let tE = 0, tS = 0;
            let htmlR = "", htmlD = "";
            
            // Ordena por data decrescente (mais recentes primeiro)
            const dadosOrdenados = [...dados].sort((a, b) => {
                const dataA = a.Data.split(' ')[0].split('/').reverse().join('');
                const dataB = b.Data.split(' ')[0].split('/').reverse().join('');
                return dataB.localeCompare(dataA);
            });

            dadosOrdenados.forEach(i => {
                const v = parseFloat(i.Valor) || 0;
                const ehR = (i.Tipo || i.tipo || "").toLowerCase().trim() === "receita";
                const card = `
                <div class="transacao">
                    <div class="info">
                        <small>${i.Data}</small><strong>${i.Item}</strong><span class="cat-tag">#${i.Categoria}</span>
                        ${i.Comentario_da_IA ? `<div class="ai-comment">🤖 ${i.Comentario_da_IA}</div>` : ''}
                    </div>
                    <div class="valor" style="color:${ehR?'var(--green)':'var(--red)'}">${ehR?'+':'-'} R$ ${v.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                </div>`;
                if(ehR) { tE += v; htmlR += card; } else { tS += v; htmlD += card; }
            });

            document.getElementById('saldo-valor').innerText = `R$ ${(tE-tS).toLocaleString('pt-BR', {maximumFractionDigits: 0})}`;
            document.getElementById('t-ent').innerText = `R$ ${tE.toLocaleString('pt-BR', {maximumFractionDigits: 0})}`;
            document.getElementById('t-sai').innerText = `R$ ${tS.toLocaleString('pt-BR', {maximumFractionDigits: 0})}`;
            document.getElementById('lista-receitas').innerHTML = htmlR || "<p style='text-align:center; font-size:0.8rem;'>Vazio</p>";
            document.getElementById('lista-despesas').innerHTML = htmlD || "<p style='text-align:center; font-size:0.8rem;'>Vazio</p>";
            
            updateChart('meuGrafico', 'doughnut', { 
                labels: ['Receitas', 'Despesas'], 
                datasets: [{ data: [tE, tS], backgroundColor: ['#2ecc71', '#e74c3c'], borderWidth: 0 }] 
            }, { cutout: '82%', plugins: { datalabels: { display: false }, legend: { display: false } } });
        }

        // Lógica de BI simplificada para performance
        function processarBI() {
            const f = document.getElementById('filtroTempo').value;
            const agora = new Date();
            const mesAtStr = `${String(agora.getMonth() + 1).padStart(2, '0')}/${agora.getFullYear()}`;
            
            const filtrados = todosOsDados.filter(i => {
                if (!i.Data) return false;
                return (f === "mes_atual") ? i.Data.includes(mesAtStr) : i.Data.includes(f);
            });

            const catAgrupada = {}, diaMap = {};
            filtrados.forEach(i => {
                if ((i.Tipo || i.tipo || "").toLowerCase() === 'despesa') {
                    const v = parseFloat(i.Valor) || 0;
                    const d = i.Data.split('/')[0];
                    let catFinal = i.Categoria || 'Geral';
                    
                    for (const [macro, subs] of Object.entries(MAPA_CATEGORIAS)) {
                        if (subs.some(s => catFinal.toLowerCase().includes(s.toLowerCase()))) { catFinal = macro; break; }
                    }
                    catAgrupada[catFinal] = (catAgrupada[catFinal] || 0) + v;
                    diaMap[d] = (diaMap[d] || 0) + v;
                }
            });

            const entradasOrdenadas = Object.entries(catAgrupada).sort((a, b) => b[1] - a[1]);
            const labelsFinal = []; const valoresFinal = [];
            let htmlTabela = "";

            entradasOrdenadas.forEach(([label, valor], index) => {
                if (index < 5) { labelsFinal.push(label); valoresFinal.push(valor); }
                htmlTabela += `<tr><td class="rank">${index + 1}</td><td>${label}</td><td style="text-align: right; font-weight: bold;">R$ ${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td></tr>`;
            });
            document.getElementById('corpo-tabela-gastos').innerHTML = htmlTabela || "<tr><td colspan='3' style='text-align:center'>Sem dados</td></tr>";

            updateChart('graficoBarras', 'bar', {
                labels: labelsFinal,
                datasets: [{ data: valoresFinal, backgroundColor: '#ff4081', borderRadius: 6 }]
            }, { indexAxis: 'y', plugins: { legend: { display: false }, datalabels: { color: '#fff', anchor: 'end', align: 'right', formatter: v => `R$ ${v.toFixed(0)}`, font: { weight: 'bold', size: 10 } } }, scales: { x: { display: false }, y: { ticks: { color: '#fff' }, grid: { display: false } } } });

            const dias = Object.keys(diaMap).sort((a,b) => parseInt(a) - parseInt(b));
            let acc = 0;
            updateChart('graficoLinha', 'line', {
                labels: dias,
                datasets: [{ data: dias.map(d => { acc += diaMap[d]; return acc; }), borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.1)', fill: true, tension: 0.4, pointRadius: 2 }]
            }, { plugins: { legend: { display: false }, datalabels: { display: (ctx) => ctx.dataIndex === ctx.dataset.data.length - 1, backgroundColor: '#3498db', color: '#fff', borderRadius: 4, padding: 4, formatter: v => `R$ ${v.toFixed(0)}` } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#888' } } } });
        }

        function mudarAba(aba) {
            document.getElementById('container-feed').style.display = (aba === 'feed') ? 'block' : 'none';
            document.getElementById('container-bi').style.display = (aba === 'bi') ? 'block' : 'none';
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${aba}`).classList.add('active');
            if (aba === 'bi') setTimeout(processarBI, 100);
        }

        function updateChart(id, type, data, options) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id);
            if (ctx) charts[id] = new Chart(ctx, { type, data, options });
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
